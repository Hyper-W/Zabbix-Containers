apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
  labels:
    app: zabbix-web
spec:
  selector:
    matchLabels:
      app: zabbix-web
  replicas: 1
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-mysql:7.0-alpine-latest
          envFrom:
            - configMapRef:
                name: zabbix
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-db
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zabbix-db
                  key: MYSQL_DATABASE
          ports:
            - containerPort: 8080
              name: zabbix-web
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  type: LoadBalancer
  ports:
    - name: zabbix-web
      port: 80
      targetPort: 8080
  selector:
    app: zabbix-web
